<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Buku</title>
    <!-- Simple inline styling untuk user interface yang minimalis dan rapi -->
    <style>
        body { font-family: Arial, sans-serif; background-image: url("{{ url_for('static', filename='wp12420099.jpg') }}"); background-size: cover; background-attachment: fixed; background-position: center; color: white; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: rgba(0, 0, 0, 0.5); color: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        h1, h2 { color: white; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: white; }
        input[type="text"], input[type="number"], select { width: 100%; padding: 10px; border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 4px; box-sizing: border-box; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); color: white; }
        select option { background: #333; color: white; }
        button { padding: 10px 15px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #218838; }
        .btn-cancel { background: #6c757d; }
        .btn-cancel:hover { background: #5a6268; }
        .alert { padding: 10px; margin-bottom: 15px; border-radius: 4px; }
        .alert-success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb;}
        .alert-danger { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb;}
    </style>
</head>
<body>
    <div class="container">
        <h1>Sistem Toko Buku</h1>
        <hr>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="form-container">
            <h2>Edit Buku</h2>
            <form action="{{ url_for('edit_book', book_id=book.id) }}" method="POST">
                <div class="form-group">
                    <label>Judul Buku:</label>
                    <input type="text" name="title" value="{{ book.title }}" required>
                </div>
                <div class="form-group">
                    <label>Penulis:</label>
                    <input type="text" name="author" value="{{ book.author }}" required>
                </div>
                <div class="form-group">
                    <label>Tahun Terbit:</label>
                    <input type="number" name="year" value="{{ book.year }}" required>
                </div>
                <div class="form-group">
                    <label>Harga Buku (Rp):</label>
                    <input type="number" name="price" value="{{ book.price }}" required>
                </div>
                <div class="form-group">
                    <label>Tipe Buku:</label>
                    <select name="type">
                        <option value="Printed" {% if book.type == 'Printed' %}selected{% endif %}>Buku Cetak Umum</option>
                        <option value="EBook" {% if book.type == 'EBook' %}selected{% endif %}>Digital (E-Book)</option>
                    </select>
                </div>
                <button type="submit">Update Data</button>
                <a href="{{ url_for('index') }}">
                    <button type="button" class="btn-cancel">Batal</button>
                </a>
            </form>
        </div>
    </div>
</body>
</html>
